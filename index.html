<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toms Technik-Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FBF7EF;
    --ink: #2B2B33;
    --elektro: #F6A623;
    --elektro-soft: #FDEBCB;
    --getriebe: #2E86AB;
    --getriebe-soft: #DCEEF7;
    --mobil: #5FAD56;
    --mobil-soft: #E2F2DD;
    --verkehr: #C5453B;
    --verkehr-soft: #FBE2DF;
    --card: #FFFFFF;
    --shadow: 0 6px 0 rgba(0,0,0,0.08);
    --radius: 22px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Nunito', sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
  }
  .app{max-width:900px;margin:0 auto;padding:18px 16px 60px;}

  /* HEADER */
  header{
    text-align:center;
    padding:28px 10px 18px;
  }
  header h1{
    font-size:2rem;
    font-weight:900;
    margin:0 0 4px;
    line-height:1.15;
  }
  header p{
    font-size:1.1rem;
    font-weight:700;
    color:#6b6b75;
    margin:0;
  }
  .progress-wrap{
    margin:18px auto 0;
    max-width:600px;
    background:#fff;
    border-radius:20px;
    padding:14px 18px;
    box-shadow:var(--shadow);
  }
  .progress-bar{
    height:16px;
    background:#EFEAE0;
    border-radius:10px;
    overflow:hidden;
    margin-top:8px;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,#5FAD56,#8BD17D);
    border-radius:10px;
    transition:width .4s ease;
    width:0%;
  }
  .progress-label{font-weight:800; font-size:1rem;}
  .star-row{font-size:1.4rem; margin-top:4px;}

  /* NAV / TOPIC GRID */
  .topics{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    margin-top:24px;
  }
  @media (max-width:560px){
    .topics{grid-template-columns:1fr;}
  }
  .topic-card{
    border:none;
    border-radius:var(--radius);
    padding:22px 18px;
    text-align:left;
    cursor:pointer;
    box-shadow:var(--shadow);
    transition:transform .15s ease;
    font-family:inherit;
    position:relative;
    overflow:hidden;
  }
  .topic-card:hover{transform:translateY(-3px);}
  .topic-card:active{transform:translateY(1px); box-shadow:0 2px 0 rgba(0,0,0,0.08);}
  .topic-card .emoji{font-size:2.4rem; display:block; margin-bottom:8px;}
  .topic-card h3{margin:0 0 4px; font-size:1.3rem; font-weight:900;}
  .topic-card p{margin:0; font-size:.98rem; font-weight:700; opacity:.75;}
  .topic-card .done-badge{
    position:absolute; top:14px; right:14px;
    background:#fff; border-radius:50%;
    width:34px;height:34px;
    display:flex;align-items:center;justify-content:center;
    font-size:1.2rem;
    box-shadow:0 2px 4px rgba(0,0,0,.15);
  }
  .t-elektro{background:var(--elektro-soft);}
  .t-getriebe{background:var(--getriebe-soft);}
  .t-mobil{background:var(--mobil-soft);}
  .t-verkehr{background:var(--verkehr-soft);}

  .mode-row{
    display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;
  }
  .mode-btn{
    flex:1;
    min-width:120px;
    border:none;
    border-radius:14px;
    padding:10px 12px;
    font-family:inherit;
    font-weight:800;
    font-size:.95rem;
    cursor:pointer;
    background:#fff;
    box-shadow:0 3px 0 rgba(0,0,0,.08);
  }
  .mode-btn:active{box-shadow:0 1px 0 rgba(0,0,0,.08); transform:translateY(2px);}

  /* SCREEN MANAGEMENT */
  .screen{display:none;}
  .screen.active{display:block;}

  .back-btn{
    background:#fff;
    border:none;
    border-radius:14px;
    padding:10px 18px;
    font-family:inherit;
    font-weight:800;
    font-size:1rem;
    cursor:pointer;
    box-shadow:var(--shadow);
    margin-bottom:18px;
  }
  .back-btn:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.08);}

  .topic-header{
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:18px;
    box-shadow:var(--shadow);
  }
  .topic-header h2{margin:0 0 4px; font-size:1.5rem; font-weight:900;}
  .topic-header p{margin:0; font-weight:700; opacity:.8;}

  /* FLASHCARDS */
  .card-stage{
    perspective:1200px;
    margin:0 auto 18px;
    max-width:560px;
  }
  .flashcard{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    min-height:260px;
    padding:28px 24px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    cursor:pointer;
    transition:transform .25s;
  }
  .flashcard.flipped{background:#FFF9EC;}
  .flashcard .label{
    font-size:.85rem;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:#9b9ba3;
    margin-bottom:10px;
  }
  .flashcard .emoji-big{font-size:3rem; margin-bottom:10px;}
  .flashcard .content{font-size:1.25rem; font-weight:800; line-height:1.4;}
  .flashcard .hint{
    margin-top:14px;
    font-size:.95rem;
    font-weight:700;
    color:#9b9ba3;
  }
  .card-nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    max-width:560px;
    margin:0 auto 20px;
  }
  .nav-btn{
    background:#fff;
    border:none;
    border-radius:50%;
    width:54px;height:54px;
    font-size:1.5rem;
    cursor:pointer;
    box-shadow:var(--shadow);
  }
  .nav-btn:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.08);}
  .nav-btn:disabled{opacity:.3; cursor:default;}
  .card-counter{font-weight:800; font-size:1.1rem;}

  /* QUIZ */
  .quiz-box{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:24px;
    max-width:600px;
    margin:0 auto 18px;
  }
  .quiz-question{
    font-size:1.2rem;
    font-weight:800;
    margin-bottom:18px;
    line-height:1.4;
  }
  .quiz-img{
    width:100%;
    max-width:280px;
    display:block;
    margin:0 auto 16px;
    border-radius:14px;
  }
  .quiz-options{display:flex; flex-direction:column; gap:10px;}
  .quiz-option{
    border:3px solid #EFEAE0;
    background:#fff;
    border-radius:16px;
    padding:14px 16px;
    font-family:inherit;
    font-size:1.05rem;
    font-weight:700;
    text-align:left;
    cursor:pointer;
    transition:all .15s;
  }
  .quiz-option:hover{border-color:#D8D2C4;}
  .quiz-option.correct{
    border-color:#5FAD56;
    background:#E2F2DD;
  }
  .quiz-option.wrong{
    border-color:#C5453B;
    background:#FBE2DF;
  }
  .quiz-option:disabled{cursor:default;}
  .quiz-feedback{
    margin-top:16px;
    padding:14px;
    border-radius:14px;
    font-weight:800;
    font-size:1.05rem;
    display:none;
  }
  .quiz-feedback.show{display:block;}
  .quiz-feedback.correct-fb{background:#E2F2DD; color:#2E6B27;}
  .quiz-feedback.wrong-fb{background:#FBE2DF; color:#8E2E26;}
  .quiz-explain{font-weight:700; font-size:.98rem; margin-top:6px; opacity:.85;}
  .quiz-next{
    margin-top:16px;
    width:100%;
    border:none;
    border-radius:16px;
    padding:14px;
    font-family:inherit;
    font-weight:800;
    font-size:1.05rem;
    cursor:pointer;
    background:var(--ink);
    color:#fff;
    display:none;
  }
  .quiz-next.show{display:block;}
  .quiz-progress{
    text-align:center;
    font-weight:800;
    margin-bottom:10px;
    color:#6b6b75;
  }

  /* RESULT SCREEN */
  .result-box{
    text-align:center;
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:36px 24px;
    max-width:500px;
    margin:0 auto;
  }
  .result-emoji{font-size:4rem; margin-bottom:10px;}
  .result-box h2{margin:0 0 6px; font-size:1.6rem; font-weight:900;}
  .result-box p{font-weight:700; font-size:1.1rem; color:#6b6b75; margin:0 0 20px;}
  .result-btn{
    border:none;
    border-radius:16px;
    padding:14px 22px;
    font-family:inherit;
    font-weight:800;
    font-size:1.05rem;
    cursor:pointer;
    margin:6px;
    background:var(--ink);
    color:#fff;
  }
  .result-btn.secondary{background:#fff; color:var(--ink); box-shadow:var(--shadow);}

  footer{
    text-align:center;
    margin-top:30px;
    font-size:.85rem;
    color:#a3a3ab;
    font-weight:700;
  }
</style>
</head>
<body>
<div class="app">

  <!-- START SCREEN -->
  <div class="screen active" id="screen-home">
    <header>
      <h1>🔧 Toms Technik-Trainer</h1>
      <p>Fit für die Klassenarbeit!</p>
    </header>

    <div class="progress-wrap">
      <div class="progress-label" id="overall-label">Noch nichts geschafft – los geht's! 💪</div>
      <div class="progress-bar"><div class="progress-fill" id="overall-fill"></div></div>
      <div class="star-row" id="overall-stars">⭐⭐⭐⭐</div>
    </div>

    <div class="topics">
      <button class="topic-card t-elektro" onclick="openTopic('elektro')">
        <span class="emoji">⚡</span>
        <h3>Elektrotechnik</h3>
        <p>Spannung, Stromkreis, Widerstand</p>
        <div class="done-badge" id="badge-elektro">🔒</div>
      </button>

      <button class="topic-card t-getriebe" onclick="openTopic('getriebe')">
        <span class="emoji">⚙️</span>
        <h3>Getriebe & Maschinen</h3>
        <p>Räder, Übersetzung, EVA-Prinzip</p>
        <div class="done-badge" id="badge-getriebe">🔒</div>
      </button>

      <button class="topic-card t-mobil" onclick="openTopic('mobil')">
        <span class="emoji">🚇</span>
        <h3>Mobilität</h3>
        <p>Verkehrsmittel früher & heute</p>
        <div class="done-badge" id="badge-mobil">🔒</div>
      </button>

      <button class="topic-card t-verkehr" onclick="openTopic('verkehr')">
        <span class="emoji">🌍</span>
        <h3>Verkehr & Umwelt</h3>
        <p>Feinstaub, Lärm, Stau, Klima</p>
        <div class="done-badge" id="badge-verkehr">🔒</div>
      </button>
    </div>

    <footer>Tippe auf ein Thema, dann auf 🃏 Karten oder ❓ Quiz</footer>
  </div>

  <!-- TOPIC MENU SCREEN -->
  <div class="screen" id="screen-topic">
    <button class="back-btn" onclick="goHome()">⬅️ Zurück</button>
    <div class="topic-header" id="topic-header-box">
      <h2 id="topic-title">Thema</h2>
      <p id="topic-sub">Untertitel</p>
    </div>
    <div class="mode-row">
      <button class="mode-btn" onclick="startCards()">🃏 Lernkarten</button>
      <button class="mode-btn" onclick="startQuiz()">❓ Quiz starten</button>
    </div>
  </div>

  <!-- FLASHCARD SCREEN -->
  <div class="screen" id="screen-cards">
    <button class="back-btn" onclick="goTopicMenu()">⬅️ Zurück</button>
    <div class="card-stage">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="label">Frage – tippen zum Umdrehen</div>
        <div class="emoji-big" id="card-emoji">💡</div>
        <div class="content" id="card-content">...</div>
        <div class="hint">👆 Antippen</div>
      </div>
    </div>
    <div class="card-nav">
      <button class="nav-btn" id="card-prev" onclick="prevCard()">⬅️</button>
      <div class="card-counter" id="card-counter">1 / 10</div>
      <button class="nav-btn" id="card-next" onclick="nextCard()">➡️</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="screen-quiz">
    <button class="back-btn" onclick="goTopicMenu()">⬅️ Zurück</button>
    <div class="quiz-progress" id="quiz-progress">Frage 1 / 8</div>
    <div class="quiz-box">
      <div class="quiz-question" id="quiz-question">Frage...</div>
      <div class="quiz-options" id="quiz-options"></div>
      <div class="quiz-feedback" id="quiz-feedback">
        <div id="quiz-feedback-text"></div>
        <div class="quiz-explain" id="quiz-explain"></div>
      </div>
      <button class="quiz-next" id="quiz-next-btn" onclick="nextQuizQuestion()">Weiter ➡️</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="screen-result">
    <div class="result-box">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <h2 id="result-title">Super gemacht!</h2>
      <p id="result-sub">Du hast 7 von 8 richtig.</p>
      <button class="result-btn" onclick="startQuiz()">🔁 Nochmal üben</button>
      <button class="result-btn secondary" onclick="goHome()">🏠 Zur Startseite</button>
    </div>
  </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
